{% extends 'base.html' %}
{% block title %}Home | GroceryMart{% endblock %}

{% block content %}

<!-- Hero Section -->
<div class="cursor-glow"></div>

<section class="hero">
    <h1 class="glitch" data-text="Groceries Gone Wild ⚡">
        Groceries Gone Wild ⚡
    </h1>
    <p>Fast. Fresh. Unhinged energy.</p>
    <button class="shop-btn">Enter the Chaos</button>
</section>

<!-- Categories Section -->
<section class="categories">
    <h2>Shop by Categories</h2>
    <div class="category-container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1587049352846-4a222e784d38" alt="">
            <h3>Fruits</h3>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" alt="">
            <h3>Vegetables</h3>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1585238342024-78d387f4a707" alt="">
            <h3>Dairy</h3>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1580910051074-3eb694886505" alt="">
            <h3>Beverages</h3>
        </div>
    </div>
</section>

{% endblock %}
