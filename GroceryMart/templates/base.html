{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}GroceryMart{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

    <!-- 🔥 Navbar -->
    <nav class="navbar">
        <div class="logo">🛒 GroceryMart</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="{% url 'shop' %}">Shop</a></li>
            <li><a href="{% url 'categories' %}">Categories</a></li>
            <a href="{% url 'offers' %}">Offers</a>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="nav-btn">
            <a href="#" class="login-btn">Login</a>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            /* ===== SAFE QUERY HELPER ===== */
            const $ = (selector) => document.querySelector(selector);
            const $$ = (selector) => document.querySelectorAll(selector);

            /* ===== Scroll Reveal ===== */
            const revealCards = $$(".card");
            if (revealCards.length) {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('show');
                        }
                    });
                });
                revealCards.forEach(card => observer.observe(card));
            }

            /* ===== Mouse Glow ===== */
            const glow = $(".cursor-glow");
            if (glow) {
                document.addEventListener('mousemove', e => {
                    glow.style.left = e.pageX + 'px';
                    glow.style.top = e.pageY + 'px';
                });
            }

            /* ===== Cart Logic ===== */
            const cartDisplay = $("#cart-count");
            const buttons = $$(".cart-btn");
            const toast = $("#toast");

            if (cartDisplay && buttons.length) {
                let cartCount = 0;

                buttons.forEach(btn => {
                    btn.addEventListener("click", () => {
                        cartCount++;
                        cartDisplay.textContent = cartCount;

                        if (toast) {
                            toast.classList.add("show");
                            setTimeout(() => toast.classList.remove("show"), 1500);
                        }
                    });
                });
            }

            /* ===== Filter ===== */
            const filterBtns = $$(".filter-btn");
            const products = $$(".product-card");

            if (filterBtns.length && products.length) {
                filterBtns.forEach(btn => {
                    btn.addEventListener("click", () => {

                        const activeBtn = $(".filter-btn.active");
                        if (activeBtn) activeBtn.classList.remove("active");

                        btn.classList.add("active");

                        const filter = btn.dataset.filter;

                        products.forEach(product => {
                            product.style.display =
                                filter === "all" || product.dataset.category === filter
                                    ? "block"
                                    : "none";
                        });
                    });
                });
            }

            /* ===== Search ===== */
            const searchInput = $("#searchInput");

            if (searchInput && products.length) {
                searchInput.addEventListener("keyup", () => {
                    const value = searchInput.value.toLowerCase();

                    products.forEach(product => {
                        const name = product.querySelector("h3")?.textContent.toLowerCase();
                        product.style.display =
                            name && name.includes(value) ? "block" : "none";
                    });
                });
            }

            /* ===== Countdown ===== */
            const countdownEl = $("#countdown");

            if (countdownEl) {
                let time = 3600;

                setInterval(() => {
                    let hours = Math.floor(time / 3600);
                    let minutes = Math.floor((time % 3600) / 60);
                    let seconds = time % 60;

                    countdownEl.textContent =
                        String(hours).padStart(2, '0') + " : " +
                        String(minutes).padStart(2, '0') + " : " +
                        String(seconds).padStart(2, '0');

                    if (time > 0) time--;
                }, 1000);
            }

            /* ===== Counter Animation ===== */
            const counters = $$(".count");

            if (counters.length) {
                counters.forEach(counter => {
                    const target = +counter.getAttribute("data-target");
                    let count = 0;

                    const update = () => {
                        const increment = target / 100;
                        count += increment;

                        if (count < target) {
                            counter.innerText = Math.floor(count);
                            requestAnimationFrame(update);
                        } else {
                            counter.innerText = target;
                        }
                    };

                    update();
                });
            }

        });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

</body>

</html>
