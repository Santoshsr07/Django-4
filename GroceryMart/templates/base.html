{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}GroceryMart{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

    <!-- 🔥 Navbar -->
    <nav class="navbar">
        <div class="logo" id="site-logo">
            🛒 GroceryMart
        </div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="{% url 'shop' %}">Shop</a></li>
            <li><a href="{% url 'categories' %}">Categories</a></li>
            <li><a href="{% url 'offers' %}">Offers</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="nav-btn">

            <a href="{% url 'cart' %}" class="login-btn">
                🛒 Cart (<span id="nav-cart-count">0</span>)
            </a>

            {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}" class="dev-logout-form">
                {% csrf_token %}
                <button type="submit" class="dev-logout">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="secondary-btn">Login</a>
            {% endif %}

        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            /* ===== SAFE QUERY HELPER ===== */
            const $ = (selector) => document.querySelector(selector);
            const $$ = (selector) => document.querySelectorAll(selector);

            /* ===== Scroll Reveal ===== */
            const revealCards = $$(".card");
            if (revealCards.length) {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('show');
                        }
                    });
                });
                revealCards.forEach(card => observer.observe(card));
            }

            /* ===== Mouse Glow ===== */
            const glow = $(".cursor-glow");
            if (glow) {
                document.addEventListener('mousemove', e => {
                    glow.style.left = e.pageX + 'px';
                    glow.style.top = e.pageY + 'px';
                });
            }
            /* ===== GLOBAL CART + TOAST SYSTEM ===== */

            const navCartCount = document.getElementById("nav-cart-count");
            const cartButtons = document.querySelectorAll(".cart-btn");
            const toast = document.getElementById("cart-toast");
            const toastProductName = document.getElementById("toast-product-name");

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            // Update navbar count
            function updateCartUI() {
                if (navCartCount) {
                    navCartCount.textContent = cart.length;
                }
            }

            updateCartUI();

            // Add to cart click
            cartButtons.forEach(button => {

                button.addEventListener("click", function () {

                    const productCard = this.closest(".dry-card, .bev-card, .toys-card, .product-card");

                    if (!productCard) return;

                    const productName = productCard.querySelector("h3")?.innerText || "Item";
                    const productPrice = productCard.querySelector(".price")?.innerText || "";

                    cart.push({
                        name: productName,
                        price: productPrice
                    });

                    localStorage.setItem("cart", JSON.stringify(cart));

                    updateCartUI();

                    // Toast animation
                    if (toast && toastProductName) {
                        toastProductName.textContent = productName;
                        toast.classList.add("show");

                        setTimeout(() => {
                            toast.classList.remove("show");
                        }, 2000);
                    }
                });

            });
            /* ===== Filter ===== */
            const filterBtns = $$(".filter-btn");
            const products = $$(".product-card");

            if (filterBtns.length && products.length) {
                filterBtns.forEach(btn => {
                    btn.addEventListener("click", () => {

                        const activeBtn = $(".filter-btn.active");
                        if (activeBtn) activeBtn.classList.remove("active");

                        btn.classList.add("active");

                        const filter = btn.dataset.filter;

                        products.forEach(product => {
                            product.style.display =
                                filter === "all" || product.dataset.category === filter
                                    ? "block"
                                    : "none";
                        });
                    });
                });
            }

            /* ===== Search ===== */
            const searchInput = $("#searchInput");

            if (searchInput && products.length) {
                searchInput.addEventListener("keyup", () => {
                    const value = searchInput.value.toLowerCase();

                    products.forEach(product => {
                        const name = product.querySelector("h3")?.textContent.toLowerCase();
                        product.style.display =
                            name && name.includes(value) ? "block" : "none";
                    });
                });
            }

            /* ===== Countdown ===== */
            const countdownEl = $("#countdown");

            if (countdownEl) {
                let time = 3600;

                setInterval(() => {
                    let hours = Math.floor(time / 3600);
                    let minutes = Math.floor((time % 3600) / 60);
                    let seconds = time % 60;

                    countdownEl.textContent =
                        String(hours).padStart(2, '0') + " : " +
                        String(minutes).padStart(2, '0') + " : " +
                        String(seconds).padStart(2, '0');

                    if (time > 0) time--;
                }, 1000);
            }

            /* ===== Counter Animation ===== */
            const counters = $$(".count");

            if (counters.length) {
                counters.forEach(counter => {
                    const target = +counter.getAttribute("data-target");
                    let count = 0;

                    const update = () => {
                        const increment = target / 100;
                        count += increment;

                        if (count < target) {
                            counter.innerText = Math.floor(count);
                            requestAnimationFrame(update);
                        } else {
                            counter.innerText = target;
                        }
                    };

                    update();

                });
            }

        });

        /* ===== Smart Logo Click Logic ===== */

        
        const devLogout = document.querySelector(".dev-logout");

        if (logo) {

            let clickTimeout = null;

            logo.addEventListener("click", function () {

                if (clickTimeout) {
                    // Double click detected
                    clearTimeout(clickTimeout);
                    clickTimeout = null;

                    if (devLogout) {
                        document.querySelector(".dev-logout-form")?.classList.toggle("show");
                    }

                } else {
                    // Single click — wait to see if second click comes
                    clickTimeout = setTimeout(function () {
                        window.location.href = "/";
                        clickTimeout = null;
                    }, 250); // 250ms delay
                }
                const logo = document.getElementById("site-logo");
                const devLogoutForm = document.querySelector(".dev-logout-form");

                if (logo) {

                    let clickTimeout = null;

                    logo.addEventListener("click", function () {

                        if (clickTimeout) {
                            clearTimeout(clickTimeout);
                            clickTimeout = null;

                            if (devLogoutForm) {
                                devLogoutForm.classList.toggle("show");
                            }

                        } else {
                            clickTimeout = setTimeout(function () {
                                window.location.href = "/";
                                clickTimeout = null;
                            }, 250);
                        }

                    });
                }

            });
        }


    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <div id="cart-toast" class="cart-toast">
        <div class="toast-icon">🛒</div>
        <div class="toast-text">
            <strong>Added to cart</strong>
            <span id="toast-product-name"></span>
        </div>
    </div>

</body>

</html>
